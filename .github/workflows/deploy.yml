name: Automatyczny Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      rollback_commit:
        description: 'Podaj SHA commita do przywrócenia (Rollback)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback_commit == ''
    permissions:
      contents: read
      packages: write

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Logowanie do GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Budowanie i wypychanie obrazu Docker
      uses: docker/build-push-action@v5
      with:
        context: ./mysite
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always() && (needs.build-and-push.result == 'success' || github.event.inputs.rollback_commit != '')
    
    steps:
    - name: Ustalenie wersji obrazu do wdrozenia
      run: |
        if [ -n "${{ github.event.inputs.rollback_commit }}" ]; then
          echo "TAG=${{ github.event.inputs.rollback_commit }}" >> $GITHUB_ENV
        else
          echo "TAG=${{ github.sha }}" >> $GITHUB_ENV
        fi

    - name: Wdrozenie na serwer (Deploy przez SSH)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          docker stop django-app || true
          docker rm django-app || true
          docker run -d --name django-app -p 8000:8000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
