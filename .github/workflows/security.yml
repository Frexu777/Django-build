name: Skanowanie bezpieczenstwa

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
    - name: Pobranie kodu repozytorium
      uses: actions/checkout@v4

    - name: Instalacja Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Instalacja zależności i narzędzi
      run: |
        python -m pip install --upgrade pip
        pip install -r mysite/requirements.txt
        pip install bandit safety

    - name: Skanowanie kodu zrodlowego (Bandit)
      run: |
        cd mysite
        bandit -r .

    - name: Skanowanie podatnosci w zaleznosciach (Safety)
      run: safety check -r mysite/requirements.txt --full-report
